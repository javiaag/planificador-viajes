<!DOCTYPE html>
<html lang="es">
<head>
    <!-- head: información PARA el navegador, no se ve en pantalla -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Viajes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- body: todo lo que SÍ se ve en pantalla -->
    <h1>Planificador de Viajes</h1>

    <!-- ============================================ -->
    <!-- TU TAREA: crea aquí el formulario            -->
    <!-- ============================================ -->
    <!--
    Necesitamos un <form id="trip-form"> que contenga:

    1. Un campo de texto para el DESTINO
       <input type="text" id="destination">

    2. Un campo numérico para los DÍAS (de 1 a 30)
       pista: type="number" y atributos min / max

    3. Un desplegable para el TIPO DE VIAJE
       pista: etiqueta <select> con varias <option> dentro
       (cultural, naturaleza, fiesta, gastronómico)

    4. Un botón para enviar
       <button type="submit">Generar plan</button>

    Extra: cada campo con su <label> delante para que se
    entienda qué es. Ejemplo:
       <label for="destination">Destino:</label>

    Cuando lo tengas, dímelo y lo reviso.
    -->

    <!-- Aquí aparecerá el itinerario generado (vacío por ahora) -->
    <div id="itinerary"></div>

    <script src="script.js"></script>
</body>
</html>
