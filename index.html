<!DOCTYPE html>
<html lang="es">
<head>
    <!-- head: información PARA el navegador, no se ve en pantalla -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Viajes con IA — itinerarios día a día</title>
    <meta name="description" content="Genera un itinerario de viaje real y detallado día a día con IA: lugares concretos, precios estimados, mapa interactivo y recomendaciones, adaptado a tu presupuesto, grupo y época del año.">

    <!-- Open Graph: para que el enlace se vea bien al compartirlo (WhatsApp, etc.) -->
    <meta property="og:title" content="Planificador de Viajes con IA">
    <meta property="og:description" content="Dinos destino, días y presupuesto: te armamos un itinerario real día a día, con mapa y recomendaciones.">
    <meta property="og:type" content="website">

    <!-- Favicon: un emoji como SVG inline, sin necesidad de un archivo de imagen -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">

    <!-- Leaflet: librería de mapas gratuita, sin API key, con mapas de OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- body: todo lo que SÍ se ve en pantalla -->
    <div class="page">
        <header class="hero">
            <h1>✈️ Planificador de Viajes</h1>
            <p class="subtitle">Dinos a dónde vas y te armamos el itinerario perfecto en segundos</p>
        </header>

        <!-- Formulario para recoger los datos del viaje -->
        <form id="trip-form">
            <label for="destination">Destino:</label>
            <input type="text" id="destination" name="destination" placeholder="Ej: Roma" required>

            <label for="days">Días:</label>
            <input type="number" id="days" name="days" min="1" max="30" required>

            <label for="trip-type">Tipo de viaje:</label>
            <select id="trip-type" name="trip-type" required>
                <option value="">-- Selecciona --</option>
                <option value="cultural">Cultural</option>
                <option value="naturaleza">Naturaleza</option>
                <option value="fiesta">Fiesta</option>
                <option value="gastronomico">Gastronómico</option>
            </select>

            <label for="budget">Presupuesto total por persona (€):</label>
            <input type="number" id="budget" name="budget" min="1" placeholder="Ej: 500" required>

            <label for="group">Tipo de grupo:</label>
            <select id="group" name="group" required>
                <option value="">-- Selecciona --</option>
                <option value="jovenes">Jóvenes</option>
                <option value="familia">Familia</option>
                <option value="seniors">Seniors</option>
            </select>

            <label for="season">Época del año:</label>
            <select id="season" name="season" required>
                <option value="">-- Selecciona --</option>
                <option value="primavera">Primavera</option>
                <option value="verano">Verano</option>
                <option value="otono">Otoño</option>
                <option value="invierno">Invierno</option>
            </select>

            <label for="accommodation">¿Dónde te alojas? (opcional):</label>
            <input type="text" id="accommodation" name="accommodation" placeholder="Ej: hotel cerca de la Plaza Mayor">

            <button type="submit">Generar plan ✨</button>
        </form>

        <!-- Mapa del itinerario: solo aparece cuando el plan viene de la IA (trae coordenadas reales) -->
        <div id="map-section" class="map-section" style="display: none;">
            <div id="day-filters" class="day-filters"></div>
            <div id="map"></div>
        </div>

        <!-- Aquí aparecerá el itinerario generado (vacío por ahora) -->
        <div id="itinerary"></div>
    </div>

    <!-- Leaflet: librería de mapas gratuita, sin API key, con mapas de OpenStreetMap -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
    <script src="constants.js"></script>
    <script src="rules.js"></script>
    <script src="gemini.js"></script>
    <script src="render.js"></script>
    <!-- config.js contiene tu API key personal y NUNCA se sube a Git (ver .gitignore).
         Solo hace falta para desarrollar en local (file://). En producción (Vercel) este
         archivo no existe y da un 404 en la pestaña Network: es normal e inofensivo,
         porque en producción la key la gestiona el servidor (api/generate-itinerary.js). -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
