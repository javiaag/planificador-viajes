<!DOCTYPE html>
<html lang="es">
<head>
    <!-- head: información PARA el navegador, no se ve en pantalla -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Viajes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- body: todo lo que SÍ se ve en pantalla -->
    <div class="page">
        <header class="hero">
            <h1>✈️ Planificador de Viajes</h1>
            <p class="subtitle">Dinos a dónde vas y te armamos el itinerario perfecto en segundos</p>
        </header>

        <!-- Formulario para recoger los datos del viaje -->
        <form id="trip-form">
            <label for="destination">Destino:</label>
            <input type="text" id="destination" name="destination" placeholder="Ej: Roma" required>

            <label for="days">Días:</label>
            <input type="number" id="days" name="days" min="1" max="30" required>

            <label for="trip-type">Tipo de viaje:</label>
            <select id="trip-type" name="trip-type" required>
                <option value="">-- Selecciona --</option>
                <option value="cultural">Cultural</option>
                <option value="naturaleza">Naturaleza</option>
                <option value="fiesta">Fiesta</option>
                <option value="gastronomico">Gastronómico</option>
            </select>

            <label for="budget">Presupuesto total por persona (€):</label>
            <input type="number" id="budget" name="budget" min="1" placeholder="Ej: 500" required>

            <label for="group">Tipo de grupo:</label>
            <select id="group" name="group" required>
                <option value="">-- Selecciona --</option>
                <option value="jovenes">Jóvenes</option>
                <option value="familia">Familia</option>
                <option value="seniors">Seniors</option>
            </select>

            <label for="season">Época del año:</label>
            <select id="season" name="season" required>
                <option value="">-- Selecciona --</option>
                <option value="primavera">Primavera</option>
                <option value="verano">Verano</option>
                <option value="otono">Otoño</option>
                <option value="invierno">Invierno</option>
            </select>

            <label for="accommodation">¿Dónde te alojas? (opcional):</label>
            <input type="text" id="accommodation" name="accommodation" placeholder="Ej: hotel cerca de la Plaza Mayor">

            <button type="submit">Generar plan ✨</button>
        </form>

        <!-- Aquí aparecerá el itinerario generado (vacío por ahora) -->
        <div id="itinerary"></div>
    </div>

    <!-- config.js contiene tu API key personal y NUNCA se sube a Git (ver .gitignore) -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
